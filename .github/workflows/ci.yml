name: BBAP-Sec CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the project code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python 3.12 (the exact version mentioned in the README)
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" # This makes future downloads faster

      # 3. Install dependencies from the requirements.txt file
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest # basic quality + tests

      # 4. Check for fatal syntax errors in the Python code inside the app folder
      - name: Check Syntax Errors with flake8
        run: |
          # This command scans the app folder and stops the process if there is a fatal error (like a missing colon or syntax error)
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

          # This command shows minor issues (like lines being too long) but does not fail the build (Warning)
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # 5. Test FastAPI application execution (Dry Run)
      - name: Test FastAPI Import
        run: |
          # This command checks if the main.py file can be imported without errors (like a missing package)
          python -c "from app.main import app"
          echo "✅ Application successfully imported and ready to run!"

      # 6. Run regression tests
      - name: Run tests
        run: |
          pytest -q
